{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>{{ title }}</h1>
    <div>
        <a href="{{ url_for('visit_logs.index') }}" class="btn btn-secondary">Назад к журналу</a>
        <a href="{{ url_for('visit_logs.export_pages') }}" class="btn btn-success">Экспорт в CSV</a>
    </div>
</div>

{% if stats %}
<div class="table-responsive">
    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>№</th>
                <th>Страница</th>
                <th>Количество посещений</th>
            </tr>
        </thead>
        <tbody>
            {% for path, count in stats %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ path }}</td>
                <td>{{ count }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="alert alert-info">
    Нет данных для отображения.
</div>
{% endif %}
{% endblock %}
